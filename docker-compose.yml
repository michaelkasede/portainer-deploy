# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
version: "3.8"

services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - URL=${URL}
      - SUBDOMAINS=wildcard
      - VALIDATION=duckdns
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      #- DNSPLUGIN=cloudflare
      #- REAL_IP_FROM=cloudflare
      - EMAIL=${EMAIL}
      - SWAG_AUTORELOAD=true          # Highly recommended!
    volumes:
      - ./swag-config:/config
      - ./cloudflare.ini:/config/dns-conf/cloudflare.ini:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # QUIC
    networks:
      - proxy_net
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    command:
      - "--trusted-origins=dash.magnumlab.duckdns.org"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy_net
    restart: unless-stopped

networks:
  proxy_net:
    external: true

volumes:
  portainer_data: