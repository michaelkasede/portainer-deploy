# =============================================
# SWAG Config - Root Domain
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name magnumlab.duckdns.org www.magnumlab.duckdns.org;
    return 301 https://magnumlab.duckdns.org$request_uri;
}

server {
    # === TCP + HTTP/2 ===
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # === QUIC / HTTP/3 (UDP) ===
    listen 443 quic;
    listen [::]:443 quic;

    server_name magnumlab.duckdns.org www.magnumlab.duckdns.org;

    # SWAG SSL & Common Proxy Settings
    include /config/nginx/ssl.conf;
    include /config/nginx/proxy.conf;
    include /config/nginx/resolver.conf;
    
    # WordPress Headers
    root /var/www/html;  # or your WordPress volume path
    index index.php index.html;
    
    # HTTP/3 Advertisement
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # =============================================
    # Security Headers (Best Practice)
    # =============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # =============================================
    # Wordpress Frontend
    # =============================================
    location / {
		try_files $uri $uri/ /index.html /index.php$is_args$args;
	}

	location ~ \.php$ {
        # Ensure the file exists on SWAG's disk before passing it off
        try_files $uri =404;

        include /etc/nginx/fastcgi_params;
        
        # Use Docker's network resolver to find the wordpress container
        include /config/nginx/resolver.conf;
        set $upstream_wordpress wordpress;
        fastcgi_pass $upstream_wordpress:9000;
        
        fastcgi_index index.php;
        
        # Tell PHP-FPM the exact path on its disk to find the execution file
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Forward protocol details to prevent infinite redirect loops in WordPress
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
	}
}