# =============================================
# SWAG Config - Portainer Dashboard
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name dash.kenitemr.com;
    return 301 https://$host$request_uri;
}

server {
    # === TCP + HTTP/2 ===
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # === QUIC / HTTP/3 ===
    listen 443 quic;
    listen [::]:443 quic;

    server_name dash.kenitemr.com;

    # SWAG SSL & Common Settings
    include /config/nginx/ssl.conf;
    include /config/nginx/proxy.conf;
    include /config/nginx/resolver.conf;

    # HTTP/3 Advertisement
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # =============================================
    # Security Headers (Strict for Admin Interface)
    # =============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # =============================================
    # Portainer Proxy - Use internal HTTP endpoint
    # =============================================
    location / {
        set $upstream_app portainer;
        set $upstream_port 9000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Critical WebSocket support for Portainer (terminal, console, logs, etc.)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_read_timeout 600s;    # Long timeouts for heavy operations
        client_max_body_size 100M;  # Allow large payloads (stack imports, etc.)
    }

    # Explicit WebSocket route (extra safety)
    location /api/websocket/ {
        set $upstream_app portainer;
        set $upstream_port 9000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

    }

    # Health check
    location /health {
        return 200 "healthy\n";
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}